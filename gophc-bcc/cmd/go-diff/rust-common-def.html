function createTable(rows, cols) {
  let html = '<table><thead><tr>';
  cols.forEach(c => html += '<th>' + c + '</th>');
  html += '</tr></thead><tbody>';
  rows.forEach(r => {
    html += '<tr>';
    html += '<td class="rust-col">' + r.rust + '</td>';
    html += '<td class="go-col">' + r.go + '</td>';
    html += '<td class="' + (r.match ? 'match' : 'no-match') + '">' + (r.match ? '✓' : '✗') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function createTypeSection(name, typeData, methodData) {
  let html = '<div class="type-section">';
  html += '<div class="type-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">';
  html += '<span>' + name + '</span></div>';
  html += '<div class="type-content">';
  if (typeData && typeData.length > 0) {
    html += '<div class="category-title">类型定义</div>';
    html += createTable(typeData, ['Rust', 'Go', '匹配']);
  }
  if (methodData && methodData.length > 0) {
    html += '<div class="category-title">方法</div>';
    html += createTable(methodData, ['Rust', 'Go', '匹配']);
  }
  html += '</div></div>';
  return html;
}

function createFileSection(filename, data) {
  let html = '<div class="file-section">';
  html += '<div class="file-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">';
  html += '<span>' + filename + '</span><span class="file-name">' + Object.keys(data).filter(k => data[k] && Object.keys(data[k]).length) + ' categories</span></div>';
  html += '<div class="file-content">';
  
  if (data.types) {
    html += '<div class="category-title">类型定义</div>';
    html += createTable(data.types, ['Rust', 'Go', '匹配']);
  }
  if (data.methods) {
    html += '<div class="category-title">方法</div>';
    html += createTable(data.methods, ['Rust', 'Go', '匹配']);
  }
  if (data.consts) {
    html += '<div class="category-title">常量</div>';
    html += createTable(data.consts, ['Rust', 'Go', '匹配']);
  }
  if (data.funcs) {
    html += '<div class="category-title">公共函数</div>';
    html += createTable(data.funcs, ['Rust', 'Go', '匹配']);
  }
  if (data.privateFuncs) {
    html += '<div class="category-title">私有函数</div>';
    html += createTable(data.privateFuncs, ['Rust', 'Go', '匹配']);
  }
  
  html += '</div></div>';
  return html;
}

const container = document.getElementById('container');
Object.keys(data).forEach(file => {
  container.innerHTML += createFileSection(file, data[file]);
});
